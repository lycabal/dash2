<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Still Water" />
<meta name="theme-color" content="#EDEFE8" />
<title>Still Water</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23A63B2A'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='%23EDEFE8' font-family='serif'%3E水%3C/text%3E%3C/svg%3E" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Spectral:ital,wght@0,300;0,400;0,500;1,300&display=swap');
:root{
  --paper:#EDEFE8; --card:#F4F5F0; --ink:#232F2A; --faint:#5C6A62;
  --line:#C9CFC2; --seal:#A63B2A; --celadon:#8CA18C; --gold:#A9884F;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; background:var(--paper); color:var(--ink);
  font-family:'Spectral', Georgia, serif; font-size:15px; line-height:1.5;
  min-height:100vh;}
header{max-width:640px; margin:0 auto; padding:22px 18px 6px;
  display:flex; align-items:center; gap:10px;}
h1{font-family:'Marcellus', Georgia, serif; font-size:22px; font-weight:400;
  letter-spacing:.02em; margin:0; flex:1;}
#saveState{font-family:'Marcellus', serif; font-size:11px; letter-spacing:.08em;
  color:var(--faint);}
#saveState.err{color:var(--seal); font-weight:bold;}
#syncBtn{display:flex; align-items:center; gap:7px; background:transparent;
  border:1px solid var(--line); border-radius:16px; padding:6px 12px;
  cursor:pointer; color:var(--faint); font-family:'Marcellus', serif;
  font-size:11px; letter-spacing:.1em;}
main{max-width:640px; margin:0 auto; padding:12px 16px 100px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:6px;
  padding:16px; margin-bottom:14px;}
.card.accent{border-left:3px solid var(--seal);}
.label{font-family:'Marcellus', serif; font-size:11px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--faint); margin-bottom:8px;}
.banner{background:#F6E8E4; border:1px solid var(--seal); border-radius:6px;
  padding:10px 14px; margin-bottom:14px; font-size:13px; display:none;}
.banner.show{display:block;}
input[type=text], textarea{width:100%; border:1px solid var(--line);
  border-radius:5px; background:var(--paper); padding:10px 12px;
  font-family:'Spectral', Georgia, serif; font-size:16px; color:var(--ink);
  outline:none;}
input:focus, textarea:focus{border-color:var(--celadon);}
textarea{resize:vertical;}
button{font-family:'Marcellus', serif; cursor:pointer;}
.btn{background:var(--ink); color:var(--paper); border:none; border-radius:5px;
  padding:10px 16px; font-size:13px;}
.btn.seal{background:var(--seal);}
.btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}
.btn.danger{background:transparent; color:var(--seal); border:1px solid var(--seal);}
.chip{padding:5px 12px; border-radius:14px; border:1px solid var(--line);
  background:transparent; color:var(--faint); font-size:12px;}
.chip.on{background:var(--ink); color:var(--paper); border-color:var(--ink);}
.chip.on.cel{background:var(--celadon); border-color:var(--celadon);}
.row{display:flex; gap:8px; align-items:center;}
.wrap{flex-wrap:wrap;}
.mt8{margin-top:8px;} .mt10{margin-top:10px;} .mb12{margin-bottom:12px;}
.faint{color:var(--faint);} .small{font-size:12px;} .tiny{font-size:11px;}
.italic{font-style:italic;}
.intention{display:flex; gap:10px; align-items:center; margin-bottom:8px;}
.intention input{border:none; border-bottom:1px solid var(--line);
  border-radius:0; background:transparent; padding:4px 0;}
.tick{width:22px; height:22px; border-radius:4px; border:1.5px solid var(--line);
  background:transparent; color:var(--paper); font-size:13px; flex-shrink:0;}
.tick.done{background:var(--seal); border-color:var(--seal);}
.done-text{color:var(--faint); text-decoration:line-through;}
.term{display:flex; gap:16px;}
.term .hz{writing-mode:vertical-rl; font-size:26px; letter-spacing:.2em;
  color:var(--seal); font-weight:500; border-right:1px solid var(--line);
  padding-right:12px;}
.term .name{font-family:'Marcellus', serif; font-size:20px;}
.status{font-size:11px; font-family:'Marcellus', serif; color:var(--paper);
  border:none; border-radius:12px; padding:4px 10px; flex-shrink:0;}
.streakNum{font-family:'Marcellus', serif; font-size:34px; line-height:1;}
.empty{text-align:center; color:var(--faint); font-style:italic; padding:32px 0;
  font-size:14px;}
.detail{margin-top:10px; border-top:1px solid var(--line); padding-top:10px;}
nav{position:fixed; bottom:0; left:0; right:0; background:var(--card);
  border-top:1px solid var(--line);
  padding:10px 0 max(10px, env(safe-area-inset-bottom));}
.navrow{display:flex; justify-content:space-around; max-width:640px; margin:0 auto;}
.navbtn{background:none; border:none; display:flex; flex-direction:column;
  align-items:center; gap:4px;}
.sealch{display:inline-flex; align-items:center; justify-content:center;
  width:34px; height:34px; border-radius:5px; border:1.5px solid var(--line);
  color:var(--faint); font-size:17px; transition:all .18s ease;}
.navbtn.on .sealch{background:var(--seal); border-color:var(--seal); color:var(--paper);}
.navlbl{font-family:'Marcellus', serif; font-size:10px; letter-spacing:.1em;
  color:var(--faint);}
.navbtn.on .navlbl{color:var(--ink);}
#modal{position:fixed; inset:0; background:rgba(35,47,42,.45); z-index:50;
  display:none; align-items:flex-end; justify-content:center;}
#modal.show{display:flex;}
.sheet{background:var(--paper); border-radius:16px 16px 0 0; width:100%;
  max-width:640px; max-height:88vh; overflow-y:auto; padding:20px;}
.mono{font-family:monospace; font-size:11px;}
.msg{background:var(--card); border:1px solid var(--celadon); border-radius:6px;
  padding:8px 12px; font-size:13px; margin-bottom:16px; display:none;}
.msg.show{display:block;}
@media (prefers-reduced-motion: reduce){*{transition:none !important;}}
</style>
</head>
<body>
<header>
  <h1>Still Water</h1>
  <span id="saveState"></span>
  <button id="syncBtn">⇄ SYNC</button>
</header>

<main>
  <div class="banner" id="banner">
    <strong style="font-family:'Marcellus',serif">Storage is not working on this device.</strong>
    Entries will show on screen but will not survive closing the app.
    Use ⇄ Sync to copy your data out before leaving.
  </div>
  <div id="view"></div>
</main>

<nav><div class="navrow" id="navrow"></div></nav>

<div id="modal">
  <div class="sheet" id="sheet"></div>
</div>

<script>
"use strict";
/* ============ constants ============ */
const KEY = "still-water-v1";
const TAGS = ["law","business","writing","life"];
const STATUSES = ["seed","drafting","editing","published"];
const STATUS_COLOR = {seed:"var(--celadon)", drafting:"var(--gold)", editing:"var(--seal)", published:"var(--ink)"};

const TERMS = [
 [1,5,"小寒","Minor Cold","The year's quietest stretch. Conserve, do not push."],
 [1,20,"大寒","Major Cold","Deep cold before turning. Endings are almost beginnings."],
 [2,4,"立春","Start of Spring","First stirring under the surface. Plant intentions, not deadlines."],
 [2,19,"雨水","Rain Water","Softening. Let plans absorb slowly, like rain into soil."],
 [3,5,"驚蟄","Awakening of Insects","Dormant things wake. Revisit shelved ideas."],
 [3,20,"春分","Spring Equinox","Light and dark in balance. Check what is overweighted."],
 [4,5,"清明","Clear and Bright","Clarity season. Clean the desk, the docket, the mind."],
 [4,20,"穀雨","Grain Rain","Steady nourishment. Feed the projects already planted."],
 [5,5,"立夏","Start of Summer","Growth becomes visible. Show work in progress."],
 [5,21,"小滿","Grain Buds","Full but not yet ripe. Resist harvesting early."],
 [6,5,"芒種","Grain in Ear","The busy season. Work with rhythm, not urgency."],
 [6,21,"夏至","Summer Solstice","Peak light. Yin quietly begins its return."],
 [7,7,"小暑","Minor Heat","Heat rises. Move slower on purpose; mornings are yours."],
 [7,22,"大暑","Major Heat","Fullest heat. Do less, but do it completely."],
 [8,7,"立秋","Start of Autumn","A turn you can feel before you can see. Begin refining."],
 [8,23,"處暑","End of Heat","Heat withdraws. Release what the summer accumulated."],
 [9,7,"白露","White Dew","First coolness. Precision returns; edit, condense."],
 [9,23,"秋分","Autumn Equinox","Balance again. Gather what is finished."],
 [10,8,"寒露","Cold Dew","Crisp air, clear thought. Good season for hard problems."],
 [10,23,"霜降","Frost's Descent","First frost. Decide what will not survive the year."],
 [11,7,"立冬","Start of Winter","Storing season. Consolidate, document, archive."],
 [11,22,"小雪","Minor Snow","Quiet accumulation. Small daily deposits compound."],
 [12,7,"大雪","Major Snow","Cover and protect. Guard your energy and your evenings."],
 [12,21,"冬至","Winter Solstice","Deepest dark; light returns. Rest is generative."]
];

const TEACHINGS = [
 ["Dao De Jing 8","The highest good is like water. It benefits all things without contending, and settles in the low places others avoid.","Where can you stop contending today and simply flow around?"],
 ["Dao De Jing 11","Thirty spokes share one hub; it is the emptiness at the center that makes the wheel useful. Rooms are useful because of their empty space.","Leave one hour genuinely empty today. Protect it."],
 ["Dao De Jing 16","Return to the root is called stillness. All things rise together, and I watch them return.","Sit for two minutes and only watch. No fixing."],
 ["Dao De Jing 22","Bent, and therefore whole. Low, and therefore filled. Worn, and therefore renewed.","What would yielding, not winning, look like in one situation today?"],
 ["Dao De Jing 48","In pursuit of learning, something is added every day. In pursuit of the Way, something is dropped every day.","Remove one commitment, tab, or task instead of adding one."],
 ["Dao De Jing 64","A tree that fills your arms grows from a tiny shoot. Handle things while they are still small.","Which small thing, handled today, prevents a big thing next month?"],
 ["Dao De Jing 76","The living are soft and yielding; the dead are stiff and hard. The soft and supple belong to life.","Notice where you have gone rigid. Soften it by ten percent."],
 ["Dao De Jing 67","I have three treasures: gentleness, frugality, and not daring to rush to the front of the world.","Pick one treasure and practice it deliberately today."],
 ["Zhuangzi, ch. 1","The gnarled tree the carpenters ignore grows old under the open sky. There is use in being useless.","Do one thing today that produces nothing and proves nothing."],
 ["Zhuangzi, ch. 3","Cook Ding's blade stayed sharp for nineteen years because he cut along the natural openings and never hacked at bone.","Where are you hacking at bone? Find the opening instead."],
 ["Zhuangzi, ch. 4","Fasting of the heart: empty yourself and wait. The Way gathers in emptiness alone.","Before your next hard conversation, arrive empty rather than armed."],
 ["I Ching, hexagram 2 · 坤","The earth's condition is receptive devotion. The wise carry all things with breadth of character.","Practice capacity today: receive without immediately reacting."],
 ["I Ching, hexagram 15 · 謙","The mountain rests beneath the earth: modesty. What is full is diminished; what is modest is increased.","Let one piece of good work go unannounced today."],
 ["I Ching, hexagram 52 · 艮","Keeping still like a mountain. Stopping at the right moment, moving at the right moment.","Choose one deliberate stop today: a real pause between tasks."],
 ["I Ching, hexagram 24 · 復","Return. At the solstice the ancient kings closed the passes; merchants did not travel. Rest so the new can begin.","Schedule rest the way you would schedule a filing deadline."],
 ["Dao De Jing 15","Who can wait quietly while the mud settles? Who can remain still until the moment of action?","Delay one decision until the water is actually clear."]
];

/* ============ helpers ============ */
const uid = () => Math.random().toString(36).slice(2,9);
const pad = n => String(n).padStart(2,"0");
const todayStr = () => { const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); };
const dayOfYear = d => Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
function currentTerm(date){
  let found = TERMS[TERMS.length-1];
  for(const t of TERMS){ if(new Date(date.getFullYear(), t[0]-1, t[1]) <= date) found = t; }
  return found;
}
function h(tag, props, ...kids){
  const e = document.createElement(tag);
  if(props) for(const [k,v] of Object.entries(props)){
    if(k === "style") Object.assign(e.style, v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2), v);
    else if(k === "value") e.value = v;
    else if(k === "className") e.className = v;
    else e.setAttribute(k, v);
  }
  for(const kid of kids.flat(Infinity)){
    if(kid === null || kid === undefined || kid === false) continue;
    e.append(kid.nodeType ? kid : document.createTextNode(kid));
  }
  return e;
}

/* ============ state ============ */
const DEFAULTS = () => ({
  intentions: { date: todayStr(), items: [{text:"",done:false},{text:"",done:false},{text:"",done:false}] },
  ideas: [], writing: [], journal: [], writingLog: []
});
let S = DEFAULTS();
let tab = "today";
let ideaFilter = "all", ideaOpen = null, pieceOpen = null;
let storageOK = true;

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) S = Object.assign(DEFAULTS(), JSON.parse(raw));
    localStorage.setItem("__sw_test","1"); localStorage.removeItem("__sw_test");
  }catch(e){ storageOK = false; }
  if(S.intentions.date !== todayStr()) S.intentions = DEFAULTS().intentions;
  document.getElementById("banner").classList.toggle("show", !storageOK);
}
let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  setSaveState("saving…", false);
  saveTimer = setTimeout(flush, 150);
}
function flush(){
  try{
    localStorage.setItem(KEY, JSON.stringify(S));
    setSaveState("saved ✓", false);
    storageOK = true;
    document.getElementById("banner").classList.remove("show");
  }catch(e){
    setSaveState("NOT SAVING", true);
    storageOK = false;
    document.getElementById("banner").classList.add("show");
  }
}
function setSaveState(txt, err){
  const el = document.getElementById("saveState");
  el.textContent = txt; el.classList.toggle("err", err);
}
window.addEventListener("pagehide", flush);
document.addEventListener("visibilitychange", () => { if(document.visibilityState === "hidden") flush(); });

/* ============ derived ============ */
function streak(){
  const set = new Set(S.writingLog);
  let count = 0; const d = new Date();
  if(!set.has(todayStr())) d.setDate(d.getDate()-1);
  for(;;){
    const s = d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
    if(set.has(s)){ count++; d.setDate(d.getDate()-1); } else break;
  }
  return count;
}

/* ============ views ============ */
function label(t){ return h("div",{className:"label"}, t); }

function viewToday(){
  const now = new Date();
  const t = currentTerm(now);
  const teach = TEACHINGS[dayOfYear(now) % TEACHINGS.length];
  const dateLine = now.toLocaleDateString("en-PH",{weekday:"long",month:"long",day:"numeric"});
  const placeholders = ["The one thing that matters","A steady second","A small kindness to future you"];

  const intentions = S.intentions.items.map((it,i) => {
    const inp = h("input",{type:"text",placeholder:placeholders[i],value:it.text,
      oninput:e => { it.text = e.target.value; save(); }});
    if(it.done) inp.classList.add("done-text");
    const tick = h("button",{className:"tick"+(it.done?" done":""),
      onclick:() => { it.done = !it.done; save(); render(); }}, it.done?"✓":"");
    return h("div",{className:"intention"}, tick, inp);
  });

  const cap = h("input",{type:"text",placeholder:"A passing thought, before it passes"});
  const keep = () => {
    if(!cap.value.trim()) return;
    S.ideas.unshift({id:uid(), text:cap.value.trim(), tag:"life", created:todayStr()});
    cap.value = ""; save();
  };
  cap.addEventListener("keydown", e => { if(e.key === "Enter") keep(); });

  return [
    h("div",{className:"card term"},
      h("div",{className:"hz"}, t[2]),
      h("div",{}, label(dateLine),
        h("div",{className:"name"}, t[3]),
        h("div",{className:"faint italic small mt8",style:{fontSize:"14px"}}, t[4]))),
    h("div",{className:"card"}, label("Three intentions"), intentions),
    h("div",{className:"card"}, label("Quick capture"),
      h("div",{className:"row"}, cap, h("button",{className:"btn",onclick:keep},"Keep")),
      h("div",{className:"tiny faint mt8"},"Lands in Ideas, tagged life. Sort it later.")),
    h("div",{className:"card accent"}, label("Today's teaching · " + teach[0]),
      h("div",{className:"italic",style:{lineHeight:"1.55"}}, teach[1]))
  ];
}

function viewIdeas(){
  let newTag = "writing";
  const ta = h("textarea",{rows:2,placeholder:"Write it rough. Rough is enough."});
  const tagChips = TAGS.map(t => h("button",{className:"chip"+(t===newTag?" on":""),
    onclick:e => { newTag = t;
      e.target.parentElement.querySelectorAll(".chip").forEach(c => c.classList.remove("on"));
      e.target.classList.add("on"); }}, t));
  const add = () => {
    if(!ta.value.trim()) return;
    S.ideas.unshift({id:uid(), text:ta.value.trim(), tag:newTag, created:todayStr()});
    ta.value = ""; save(); render();
  };
  const filterChips = ["all",...TAGS].map(t => h("button",
    {className:"chip"+(t===ideaFilter?" on cel":""),
     onclick:() => { ideaFilter = t; render(); }}, t));

  const shown = S.ideas.filter(x => ideaFilter==="all" || x.tag===ideaFilter);
  const cards = shown.length ? shown.map(idea => {
    const head = h("div",{style:{cursor:"pointer"},
      onclick:() => { ideaOpen = ideaOpen===idea.id ? null : idea.id; render(); }},
      h("div",{className:"row",style:{justifyContent:"space-between",alignItems:"flex-start"}},
        h("span",{style:{lineHeight:"1.4"}}, idea.text),
        h("span",{className:"tiny",style:{color:"var(--seal)",fontFamily:"'Marcellus',serif",flexShrink:0}}, idea.tag)),
      h("div",{className:"tiny faint mt8",style:{marginTop:"4px"}}, idea.created));
    let detail = null;
    if(ideaOpen === idea.id){
      const edit = h("textarea",{rows:3,value:idea.text,
        oninput:e => { idea.text = e.target.value; save(); }});
      const chips = TAGS.map(t => h("button",{className:"chip"+(idea.tag===t?" on":""),
        style:{fontSize:"11px",padding:"4px 10px"},
        onclick:() => { idea.tag = t; save(); render(); }}, t));
      detail = h("div",{className:"detail"}, edit,
        h("div",{className:"row wrap mt8"}, chips),
        h("div",{className:"row mt10"},
          h("button",{className:"btn",style:{flex:1},onclick:() => {
            S.writing.unshift({id:uid(), title:idea.text.slice(0,60), type:"essay",
              status:"seed", note:idea.text, updated:todayStr()});
            S.ideas = S.ideas.filter(x => x.id !== idea.id);
            ideaOpen = null; save(); tab = "writing"; render();
          }},"Send to Writing"),
          h("button",{className:"btn danger",onclick:() => {
            S.ideas = S.ideas.filter(x => x.id !== idea.id); save(); render();
          }},"Delete")));
    }
    return h("div",{className:"card",style:{padding:"12px"}}, head, detail);
  }) : [h("div",{className:"empty"},"Nothing here yet. An empty inbox is a clear mind.")];

  return [
    h("div",{className:"card"}, label("New idea"), ta,
      h("div",{className:"row wrap mt8"}, tagChips,
        h("button",{className:"btn seal",style:{marginLeft:"auto"},onclick:add},"Keep"))),
    h("div",{className:"row wrap mb12"}, filterChips),
    cards
  ];
}

function viewWriting(){
  let newType = "essay";
  const st = streak(), wrote = S.writingLog.includes(todayStr());
  const title = h("input",{type:"text",placeholder:"Working title, however plain"});
  const typeChips = ["essay","fiction"].map(t => h("button",
    {className:"chip"+(t===newType?" on":""),
     onclick:e => { newType = t;
       e.target.parentElement.querySelectorAll(".chip").forEach(c => c.classList.remove("on"));
       e.target.classList.add("on"); }}, t));
  const add = () => {
    if(!title.value.trim()) return;
    S.writing.unshift({id:uid(), title:title.value.trim(), type:newType,
      status:"seed", note:"", updated:todayStr()});
    title.value = ""; save(); render();
  };
  title.addEventListener("keydown", e => { if(e.key === "Enter") add(); });

  const cards = S.writing.length ? S.writing.map(p => {
    const statusBtn = h("button",{className:"status",
      style:{background:STATUS_COLOR[p.status]},
      onclick:() => { p.status = STATUSES[(STATUSES.indexOf(p.status)+1)%STATUSES.length];
        p.updated = todayStr(); save(); render(); }}, p.status);
    const head = h("div",{className:"row"},
      statusBtn,
      h("div",{style:{flex:1,cursor:"pointer"},
        onclick:() => { pieceOpen = pieceOpen===p.id ? null : p.id; render(); }},
        h("div",{}, p.title),
        h("div",{className:"tiny faint"}, p.type + " · touched " + p.updated)));
    let detail = null;
    if(pieceOpen === p.id){
      const ti = h("input",{type:"text",value:p.title,
        oninput:e => { p.title = e.target.value; p.updated = todayStr(); save(); }});
      const no = h("textarea",{rows:4,value:p.note,
        placeholder:"Angle, fragments, the sentence you're circling…",
        oninput:e => { p.note = e.target.value; p.updated = todayStr(); save(); }});
      detail = h("div",{className:"detail"}, ti, h("div",{className:"mt8"}, no),
        h("div",{className:"row mt8"},
          h("button",{className:"btn ghost",style:{flex:1},onclick:() => {
            p.type = p.type==="essay" ? "fiction" : "essay"; save(); render();
          }},"Switch to " + (p.type==="essay"?"fiction":"essay")),
          h("button",{className:"btn danger",onclick:() => {
            S.writing = S.writing.filter(x => x.id !== p.id); save(); render();
          }},"Delete")));
    }
    return h("div",{className:"card",style:{padding:"12px"}}, head, detail);
  }) : [h("div",{className:"empty"},"No pieces yet. Send an idea over, or plant one here.")];

  return [
    h("div",{className:"card row",style:{gap:"14px"}},
      h("div",{className:"streakNum",style:{color: st>0 ? "var(--seal)" : "var(--faint)"}}, String(st)),
      h("div",{style:{flex:1}},
        h("div",{style:{fontFamily:"'Marcellus',serif",fontSize:"13px"}},"day writing streak"),
        h("div",{className:"tiny faint"},"Any words count. Consistency over volume.")),
      wrote
        ? h("button",{className:"btn ghost",style:{color:"var(--celadon)",borderColor:"var(--celadon)"},disabled:""},"✓ wrote")
        : h("button",{className:"btn seal",onclick:() => { S.writingLog.push(todayStr()); save(); render(); }},"I wrote today")),
    h("div",{className:"card"}, label("New piece"), title,
      h("div",{className:"row mt8"}, typeChips,
        h("button",{className:"btn seal",style:{marginLeft:"auto"},onclick:add},"Plant"))),
    cards
  ];
}

function viewPractice(){
  const teach = TEACHINGS[dayOfYear(new Date()) % TEACHINGS.length];
  const ta = h("textarea",{rows:4,placeholder:"What settled today? What is still stirring?"});
  const keep = () => {
    if(!ta.value.trim()) return;
    S.journal.unshift({id:uid(), date:todayStr(), text:ta.value.trim()});
    ta.value = ""; save(); render();
  };
  const entries = S.journal.map(j =>
    h("div",{className:"card",style:{padding:"12px"}},
      h("div",{className:"row",style:{justifyContent:"space-between"}},
        h("span",{className:"small",style:{fontFamily:"'Marcellus',serif",color:"var(--seal)",fontSize:"12px"}}, j.date),
        h("button",{style:{background:"none",border:"none",color:"var(--faint)",fontSize:"11px"},
          onclick:() => { S.journal = S.journal.filter(x => x.id !== j.id); save(); render(); }},"remove")),
      h("div",{className:"mt8",style:{whiteSpace:"pre-wrap",fontSize:"14px",lineHeight:"1.55"}}, j.text)));

  return [
    h("div",{className:"card accent"}, label(teach[0]),
      h("div",{className:"italic",style:{fontSize:"16px",lineHeight:"1.6"}}, teach[1]),
      h("div",{className:"mt10 faint",style:{fontSize:"14px"}},
        h("span",{style:{fontFamily:"'Marcellus',serif",fontSize:"11px",letterSpacing:".15em",
          textTransform:"uppercase",color:"var(--seal)"}},"Practice · "), teach[2])),
    h("div",{className:"card"}, label("Reflection"), ta,
      h("div",{className:"mt8"}, h("button",{className:"btn",onclick:keep},"Keep this"))),
    entries
  ];
}

/* ============ sync ============ */
function openSync(){
  const sheet = document.getElementById("sheet");
  sheet.replaceChildren();
  const exportStr = JSON.stringify(S, null, 2);
  const msg = h("div",{className:"msg"});
  const say = t => { msg.textContent = t; msg.classList.add("show"); };

  const out = h("textarea",{rows:4,readonly:"",className:"mono",value:exportStr,
    style:{background:"var(--card)",color:"var(--faint)"},
    onfocus:e => e.target.select()});
  const inp = h("textarea",{rows:4,className:"mono",
    placeholder:"Paste your backup text here, or choose a file below.",
    style:{background:"var(--card)"}});
  const file = h("input",{type:"file",accept:"application/json,.json",style:{display:"none"},
    onchange:e => {
      const f = e.target.files && e.target.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = () => { inp.value = String(r.result); say("File read. Review, then Load."); };
      r.readAsText(f);
    }});

  sheet.append(
    h("div",{className:"row",style:{justifyContent:"space-between",marginBottom:"6px"}},
      h("div",{style:{fontFamily:"'Marcellus',serif",fontSize:"19px"}},"Sync and backup"),
      h("button",{style:{background:"none",border:"none",fontSize:"22px",color:"var(--faint)"},
        onclick:closeSync},"×")),
    h("div",{className:"small faint",style:{marginBottom:"16px",lineHeight:"1.5"}},
      "Copy or download your data here, then load it on another device. The device you Load onto is overwritten, so always carry the newest copy forward."),
    msg,
    label("Send from this device"), out,
    h("div",{className:"row mt8",style:{marginBottom:"22px"}},
      h("button",{className:"btn",style:{flex:1},onclick:async () => {
        try{ await navigator.clipboard.writeText(exportStr); say("Copied. Paste it on your other device."); }
        catch(e){ say("Copy blocked. Select the text and copy by hand."); }
      }},"Copy text"),
      h("button",{className:"btn ghost",style:{flex:1},onclick:() => {
        try{
          const blob = new Blob([exportStr],{type:"application/json"});
          const url = URL.createObjectURL(blob);
          const a = h("a",{href:url,download:"still-water-"+todayStr()+".json"});
          document.body.append(a); a.click(); a.remove(); URL.revokeObjectURL(url);
          say("File saved.");
        }catch(e){ say("Download blocked here. Use Copy instead."); }
      }},"Download file")),
    label("Load onto this device"), inp,
    h("div",{className:"row mt8"},
      h("label",{className:"btn ghost",style:{flex:1,textAlign:"center"}},"Choose file", file),
      h("button",{className:"btn seal",style:{flex:1},onclick:() => {
        if(!inp.value.trim()){ say("Paste your backup text first."); return; }
        let parsed;
        try{ parsed = JSON.parse(inp.value); }
        catch(e){ say("That text is not valid. Check the paste and try again."); return; }
        if(typeof parsed !== "object" || parsed === null || Array.isArray(parsed)){
          say("That does not look like a Still Water backup."); return; }
        if(!confirm("This replaces everything currently on this device. Continue?")) return;
        S = Object.assign(DEFAULTS(), parsed);
        if(S.intentions.date !== todayStr()) S.intentions = DEFAULTS().intentions;
        save(); render(); closeSync();
      }},"Load")));
  document.getElementById("modal").classList.add("show");
}
function closeSync(){ document.getElementById("modal").classList.remove("show"); }
document.getElementById("modal").addEventListener("click", e => {
  if(e.target.id === "modal") closeSync();
});
document.getElementById("syncBtn").addEventListener("click", openSync);

/* ============ shell ============ */
const NAV = [["today","今","Today"],["ideas","思","Ideas"],["writing","書","Writing"],["practice","心","Practice"]];
function renderNav(){
  const row = document.getElementById("navrow");
  row.replaceChildren(...NAV.map(([id,ch,lbl]) =>
    h("button",{className:"navbtn"+(tab===id?" on":""),
      onclick:() => { tab = id; render(); window.scrollTo(0,0); }},
      h("span",{className:"sealch"}, ch),
      h("span",{className:"navlbl"}, lbl))));
}
function render(){
  const view = document.getElementById("view");
  const content = tab==="today" ? viewToday()
    : tab==="ideas" ? viewIdeas()
    : tab==="writing" ? viewWriting()
    : viewPractice();
  view.replaceChildren(...content.flat());
  renderNav();
}
load();
render();
</script>
